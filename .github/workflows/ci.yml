name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          # No uv.lock in this repo (libraries don't pin transitive deps);
          # key the cache off pyproject.toml so it invalidates on dep changes.
          cache-dependency-glob: 'pyproject.toml'

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --extra dev --python 3.12

      - name: Lint
        run: uv run ruff check .

      - name: Typecheck
        run: uv run mypy

      - name: Test
        run: uv run pytest -v --cov=trajkit --cov-report=term-missing
