site_name: trajkit
site_description: Behavioral primitives for spatial-temporal traces
site_url: https://github.com/darmaaz/trajkit
repo_url: https://github.com/darmaaz/trajkit
repo_name: darmaaz/trajkit

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Concepts:
      - concepts/index.md
      - Pipeline: concepts/pipeline.md
      - Parameters: concepts/parameters.md
  - Design:
      - design/LIBRARY.md
      - design/schemas.md
      - Modules:
          - design/clean.md
          - design/segment.md
          - design/episode.md
          - design/embed.md
          - design/compare.md
  - Reference:
      - reference/index.md
      - clean: reference/clean.md
      - segment: reference/segment.md
      - episode: reference/episode.md
      - embed: reference/embed.md
      - compare: reference/compare.md
      - io: reference/io.md
      - runner: reference/runner.md
      - baselines: reference/baselines.md
      - testing: reference/testing.md
      - presets: reference/presets.md
      - types: reference/types.md
