site_name: trajkit
site_description: End-to-end pipeline for trajectory analysis — reference design.
site_url: https://darmaaz.github.io/trajkit/
repo_url: https://github.com/darmaaz/trajkit
repo_name: darmaaz/trajkit

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Design:
      - design/schemas.md
      - Modules:
          - design/clean.md
          - design/segment.md
          - design/episode.md
          - design/embed.md
          - design/compare.md
      - Architecture notes: design/LIBRARY.md
